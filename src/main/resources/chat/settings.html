
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta http-equiv="content-language" content="en">
    <meta name="description" content="Cornerstone Copilot Agent Builder">

    <!-- Boot theme from localStorage before paint -->
    <script>
      (function(){
        try {
          var BOOT_THEME_KEY = 'com.markdownlivepreview_theme';
          var raw = localStorage.getItem(BOOT_THEME_KEY);
          var useDark = raw === 'dark';
          document.documentElement.setAttribute('data-theme', useDark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>

    <style>
html, body {
  margin: 0;
  padding: 0;
  font-family: Helvetica, arial, freesans, clean, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  background-color: #f6f8fa;
  color: #24292f;
  height: 100%;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Header */
.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: linear-gradient(135deg, #0969da 0%, #0550ae 100%);
  color: #fff;
  flex-shrink: 0;
}

.settings-header h2 {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.settings-header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn {
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 500;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
  outline: none;
}

.btn-save {
  background: #fff;
  color: #0969da;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
}
.btn-save:hover {
  background: #f0f6fc;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}
.btn-save:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-back {
  background: transparent;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.4);
  font-size: 13px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.btn-back:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.6);
}

/* Status bar */
.status-bar {
  padding: 0 20px;
  height: 32px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #57606a;
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  flex-shrink: 0;
}

.status-indicator {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #8b949e;
}
.status-indicator.saved { background: #2da44e; }
.status-indicator.modified { background: #d29922; }
.status-indicator.error { background: #cf222e; }

/* Editor area */
.editor-wrapper {
  flex: 1 1 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.editor-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  font-size: 12px;
  color: #57606a;
  flex-shrink: 0;
}

.editor-toolbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.editor-toolbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.editor-toolbar .filepath {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 11px;
  color: #0969da;
  background: #ddf4ff;
  padding: 2px 8px;
  border-radius: 4px;
}

.line-count {
  font-size: 11px;
  color: #8b949e;
}

.editor-btn {
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid #d0d7de;
  border-radius: 4px;
  cursor: pointer;
  background: #f6f8fa;
  color: #24292f;
  transition: all 0.15s;
  white-space: nowrap;
  line-height: 1.4;
}
.editor-btn:hover {
  background: #ddf4ff;
  border-color: #0969da;
  color: #0969da;
}
.editor-btn.active {
  background: #ddf4ff;
  border-color: #0969da;
  color: #0969da;
}
.editor-btn:disabled {

  border-color: #d0d7de;

}
.editor-btn-sep {
  width: 1px;
  height: 18px;
  background: #d0d7de;
  margin: 0 2px;
}
[data-theme="dark"] .editor-btn {
  background: #21262d;
  border-color: #30363d;
  color: #e6edf3;
}
[data-theme="dark"] .editor-btn:hover,
[data-theme="dark"] .editor-btn.active {
  background: #30363d;

}

}

.editor-btn-validate {

}

}
.editor-btn-autofix {
  color: #9a6700;
  border-color: #d4a72c;
}
.editor-btn-autofix:hover {
  background: #fff8c5;
  border-color: #9a6700;
  color: #9a6700;
}
[data-theme="dark"] .editor-btn-validate {
  color: #3fb950;
  border-color: #238636;
}
[data-theme="dark"] .editor-btn-validate:hover {
  background: #1a3024;
  border-color: #3fb950;
  color: #3fb950;
}
[data-theme="dark"] .editor-btn-validate.has-errors {
  color: #f85149;
  border-color: #f85149;
}
[data-theme="dark"] .editor-btn-autofix {
  color: #d29922;
  border-color: #9e6a03;
}
[data-theme="dark"] .editor-btn-autofix:hover {
  background: #2d2000;
  border-color: #d29922;
  color: #d29922;
}

.validate-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 0 5px;
  border-radius: 8px;
  margin-left: 4px;
  line-height: 16px;
  vertical-align: middle;
}
.validate-badge.errors {
  background: #cf222e;
  color: #fff;
}
.validate-badge.ok {
  background: #2da44e;
  color: #fff;
}

#yaml-editor {
  flex: 1 1 0;
  min-height: 0;
  width: 100%;
  font-size: 13px;
}

/* Keyboard shortcut hint */
.shortcut-hint {
  font-size: 11px;
  color: #8b949e;
  padding: 0 20px 8px 20px;
  background: #fff;
  flex-shrink: 0;
}

kbd {
  background: #f6f8fa;

}

/* Dark theme */
[data-theme="dark"] html, [data-theme="dark"] body {
  background-color: #0d1117;
  color: #e6edf3;
}

[data-theme="dark"] .settings-header {
  background: linear-gradient(135deg, #238636 0%, #1a7f37 100%);
}

[data-theme="dark"] .btn-save {
  background: #21262d;
  color: #58a6ff;

}
[data-theme="dark"] .btn-save:hover {
  background: #30363d;
}

[data-theme="dark"] .btn-back {
  border-color: rgba(255,255,255,0.3);
}
[data-theme="dark"] .btn-back:hover {

}

[data-theme="dark"] .status-bar {
  background: #161b22;
  border-bottom-color: #30363d;
  color: #8b949e;
}

[data-theme="dark"] .editor-toolbar {
  background: #161b22;
  border-bottom-color: #30363d;
  color: #8b949e;
}

[data-theme="dark"] .editor-toolbar .filepath {
  background: #1c3047;
  color: #58a6ff;
}

/* Ace editor theme is handled via ace.setTheme() */

[data-theme="dark"] kbd {
  background: #21262d;
  border-color: #30363d;
  color: #e6edf3;
  box-shadow: inset 0 -1px 0 #30363d;
}

[data-theme="dark"] .shortcut-hint {
  background: #0d1117;
  color: #484f58;
}

/* Select Knowledge button */
.btn-knowledge {
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 6px;
  cursor: pointer;
  background: rgba(255,255,255,0.15);
  color: #fff;
  transition: all 0.2s ease;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.btn-knowledge:hover {
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.6);
}
.btn-knowledge:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* Modal overlay */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}
.modal-overlay.visible {
  opacity: 1;
  visibility: visible;
}

.modal-dialog {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
  width: 92%;
  max-width: 820px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(10px);
  transition: transform 0.25s ease;
}
.modal-overlay.visible .modal-dialog {
  transform: translateY(0);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid #e8e8e8;
  flex-shrink: 0;
}
.modal-header h3 {
  margin: 0;
  font-size: 15px;
  font-weight: 600;
  color: #24292f;
}
.modal-close {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: #57606a;
  padding: 0 4px;
  line-height: 1;
}
.modal-close:hover {
  color: #cf222e;
}

.modal-body {
  flex: 1 1 0;
  min-height: 480px;
  overflow-y: auto;
  padding: 0;
}

.modal-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-top: 1px solid #e8e8e8;
  font-size: 12px;
  color: #57606a;
  flex-shrink: 0;
}

/* Search input in modal header */
.modal-search-row {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  gap: 8px;
  border-bottom: 1px solid #e8e8e8;
  flex-shrink: 0;
  background: #fff;
}
.modal-search-input {
  flex: 1;
  padding: 6px 10px;
  font-size: 13px;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  outline: none;
  background: #fff;
  color: #24292f;
  transition: border-color 0.2s;
}
.modal-search-input:focus {
  border-color: #0969da;
  box-shadow: 0 0 0 3px rgba(9,105,218,0.12);
}
.modal-search-input::placeholder {
  color: #8b949e;
}
.btn-search-clear {
  padding: 4px 10px;
  font-size: 12px;
  border: 1px solid #d0d7de;
  border-radius: 4px;
  background: #fff;
  color: #57606a;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-search-clear:hover {
  background: #f6f8fa;
  border-color: #0969da;
  color: #0969da;
}

/* Results table – chat-bubble style */
.results-table {
  border-collapse: collapse;
  border-spacing: 0;
  width: 100%;
  font-size: 13px;
}
.results-table th,
.results-table td {
  border: 1px solid #d0d7de;
  padding: 6px 13px;
}
.results-table th {
  background-color: #f6f8fa;
  font-weight: 600;
  text-align: left;
  position: relative;
  padding-right: 36px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.results-table thead {
  position: sticky;
  top: 0;
  z-index: 1;
}
.results-table tr:nth-child(2n) {
  background-color: #f6f8fa;
}
.results-table tr.result-row {
  cursor: pointer;
  transition: background 0.15s ease;
}
.results-table tr.result-row:hover {
  background: #ddf4ff !important;
}

/* Sort indicator – matches chat.html */
.table-sort-indicator {
  position: absolute;
  top: 50%;
  right: 8px;
  transform: translateY(-50%);
  font-size: 11px;
  opacity: 0.5;
  color: #57606a;
  pointer-events: none;
}
.table-sort-indicator.active {
  color: #0969da;
  opacity: 1;
}

/* Column content styles */
.results-table .col-name {
  font-weight: 600;
  color: #0969da;
  white-space: nowrap;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.results-table .col-desc {
  color: #57606a;
  max-width: 340px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.results-table .col-type {
  white-space: nowrap;
}
.results-table .type-badge {
  display: inline-block;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 500;
  border-radius: 10px;
  background: #ddf4ff;
  color: #0969da;
}

.result-empty {
  padding: 40px 20px;
  text-align: center;
  color: #8b949e;
  font-size: 13px;
}

/* Pagination */
.pagination {
  display: flex;
  align-items: center;

}
.pagination button {

}
.pagination button:hover:not(:disabled) {

  border-color: #0969da;
}
.pagination button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.pagination .page-info {
  font-size: 12px;
  color: #57606a;
  padding: 0 6px;
}

/* Dark mode - Knowledge button */
[data-theme="dark"] .btn-knowledge {

  background: rgba(255,255,255,0.1);
}
[data-theme="dark"] .btn-knowledge:hover {

}

/* Dark mode - Modal */
[data-theme="dark"] .modal-overlay {

}

}

/* Dark mode – table */

[data-theme="dark"] .results-table .col-name {

[data-theme="dark"] .results-table .col-desc {

[data-theme="dark"] .result-empty {

[data-theme="dark"] .pagination button {

/* ===== View Tabs (YAML / Designer) ===== */
.view-tabs {
  display: flex;

  background: #fff;

}

}

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;

    <!-- Ace Editor from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/mode-yaml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/theme-github.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/theme-github_dark.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ext-language_tools.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ext-searchbox.js"></script>
    <!-- js-yaml for YAML validation & parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <script>
      const JWT_TOKEN_STORAGE_KEY = 'jwttknkey';
      const saveBtn = document.getElementById('save-btn');
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const lineCount = document.getElementById('line-count');

      // --- Ace Editor setup ---
      const aceEditor = ace.edit('yaml-editor');
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      aceEditor.setTheme(isDark ? 'ace/theme/github_dark' : 'ace/theme/github');
      aceEditor.session.setMode('ace/mode/yaml');
      aceEditor.setOptions({
        fontSize: '13px',
        tabSize: 2,
        useSoftTabs: true,
        showPrintMargin: false,
        showGutter: true,         // line numbers
        showFoldWidgets: true,    // expand/collapse
        wrap: true,
        enableBasicAutocompletion: true,
        placeholder: '# Select a knowledge entry using 📚 Select Knowledge to begin editing...'
      });

      // Sync theme if user switches
      const themeObserver = new MutationObserver(() => {
        const dark = document.documentElement.getAttribute('data-theme') === 'dark';
        aceEditor.setTheme(dark ? 'ace/theme/github_dark' : 'ace/theme/github');
      });
      themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

      let originalContent = '';
      let isModified = false;
      let loadedKnowledgeName = null;

      // Convenience wrappers to keep rest of code working
      const editor = {
        get value() { return aceEditor.getValue(); },
        set value(v) { aceEditor.setValue(v, -1); },
        get disabled() { return aceEditor.getReadOnly(); },
        set disabled(v) { aceEditor.setReadOnly(v); },
        focus() { aceEditor.focus(); }
      };

      function getJwtToken() {
        try { return localStorage.getItem(JWT_TOKEN_STORAGE_KEY) || null; } catch(e) { return null; }
      }

      function buildHeaders(contentType) {
        const headers = {};
        if (contentType) headers['Content-Type'] = contentType;
        const jwt = getJwtToken();
        if (jwt) headers['jwttknckey'] = jwt;
        return headers;
      }

      function setStatus(state, text) {
        statusDot.className = 'status-indicator ' + state;
        statusText.textContent = text;
      }

      function updateLineCount() {
        const lines = aceEditor.session.getLength();
        lineCount.textContent = lines + ' line' + (lines !== 1 ? 's' : '');
      }

      function checkModified() {
        isModified = aceEditor.getValue() !== originalContent;
        if (isModified) {
          setStatus('modified', 'Modified – unsaved changes');
          saveBtn.disabled = false;
        } else {
          setStatus('saved', loadedKnowledgeName ? 'Loaded: ' + loadedKnowledgeName : 'Ready');
          saveBtn.disabled = !loadedKnowledgeName;
        }
      }

      // Extract a flat field map from the parsed YAML knowledge base for PATCH saving
      function extractKbFields(kb) {
        const fields = {};
        if (kb.name) fields.name = kb.name;
        if (kb.description !== undefined) fields.desc = kb.description || '';
        if (kb.status !== undefined) fields.status = kb.status || '';
        if (kb.module !== undefined) fields.module = kb.module || '';
        if (kb.systemPrompt !== undefined) fields.systemPrompt = kb.systemPrompt || '';
        if (kb.data !== undefined) fields.data = kb.data || '';
        if (kb.parameters !== undefined) {
          fields.params = typeof kb.parameters === 'string'
            ? kb.parameters
            : JSON.stringify(kb.parameters);
        }
        // Map YAML type string to QueryType ordinal name
        if (kb.type !== undefined) fields.type = String(kb.type);
        return fields;
      }

      // Initialize editor for knowledge base YAML editing
      function initEditor() {
        editor.value = '';
        originalContent = '';
        isModified = false;
        loadedKnowledgeName = null;
        setStatus('saved', 'Ready – select a knowledge entry to begin editing');
        updateLineCount();
        saveBtn.disabled = true;

        // Update filepath label
        const filepath = document.querySelector('.filepath');
        if (filepath) filepath.textContent = '(no entry loaded)';

        editor.focus();
      }

      // Save the edited YAML knowledge entry back to the server
async function saveSettings() {
    if (!isModified && !loadedKnowledgeName) return;

    const yamlContent = aceEditor.getValue().trim();

    if (!yamlContent) {
        setStatus('error', 'YAML content is empty');
        return;
    }

    // Validate YAML before sending to server
    let doc;
    try {
        doc = jsyaml.load(yamlContent);
    } catch (e) {
        setStatus('error', 'Cannot save – YAML has errors: ' + e.message);
        return;
    }

    // Extract KB name for status display
    let kbName = loadedKnowledgeName || '';
    if (doc && doc.knowledgeBase && doc.knowledgeBase.name) {
        kbName = doc.knowledgeBase.name;
    } else if (doc && doc.name) {
        kbName = doc.name;
    }

    setStatus('', 'Saving…');
    saveBtn.disabled = true;

    try {
        const headers = {
            'Content-Type': 'text/plain; charset=utf-8'
        };
        const jwt = getJwtToken();
        if (jwt) headers['jwttknckey'] = jwt;

        const response = await fetch('/copilot/api/v1/knowledge/import-yaml', {
            method: 'POST',
            headers: headers,
            body: yamlContent
        });

        const result = await response.json();

        if (response.ok) {
            originalContent = aceEditor.getValue();
            isModified = false;
            loadedKnowledgeName = kbName;

            const count = result.count || 0;
            const names = result.names || [];
            setStatus('saved', 'Saved: ' + kbName +
                (count > 1 ? ' + ' + (count - 1) + ' flow steps' : '') +
                ' (' + names.join(', ') + ')');
        } else {
            throw new Error(result.error || 'HTTP ' + response.status);
        }

    } catch (e) {
        console.error('Error saving knowledge:', e);
        setStatus('error', 'Save failed: ' + e.message);
    } finally {
        saveBtn.disabled = false;
    }
}

      // Ace editor change events
      aceEditor.session.on('change', () => {
        checkModified();
        updateLineCount();
      });

      // Ctrl+S to save (Ace command)
      aceEditor.commands.addCommand({
        name: 'saveSettings',
        bindKey: { win: 'Ctrl-S', mac: 'Cmd-S' },
        exec: () => saveSettings()
      });

      // --- Toolbar button handlers ---

      // Undo / Redo
      document.getElementById('btn-undo').addEventListener('click', () => {
        aceEditor.undo();
        aceEditor.focus();
      });
      document.getElementById('btn-redo').addEventListener('click', () => {
        aceEditor.redo();
        aceEditor.focus();
      });

      // Find & Replace (opens Ace's built-in search box)
      document.getElementById('btn-find').addEventListener('click', () => {
        aceEditor.execCommand('replace');
      });
      // Ctrl+G → Go to Line
      aceEditor.commands.addCommand({
        name: 'gotoLineDialog',
        bindKey: { win: 'Ctrl-G', mac: 'Cmd-G' },
        exec: () => promptGoToLine()
      });
      document.getElementById('btn-goto').addEventListener('click', () => promptGoToLine());

      function promptGoToLine() {
        const total = aceEditor.session.getLength();
        const input = prompt('Go to line (1–' + total + '):', '');
        if (input !== null && input.trim() !== '') {
          const lineNum = parseInt(input.trim(), 10);
          if (!isNaN(lineNum) && lineNum >= 1 && lineNum <= total) {
            aceEditor.gotoLine(lineNum, 0, true);
            aceEditor.focus();
          }
        }
      }

      // Fold All / Unfold All
      document.getElementById('btn-fold-all').addEventListener('click', () => {
        aceEditor.session.foldAll();
        aceEditor.focus();
      });
      document.getElementById('btn-unfold-all').addEventListener('click', () => {
        aceEditor.session.unfold();
        aceEditor.focus();
      });

      // Toggle Word Wrap
      const btnWrap = document.getElementById('btn-wrap');
      btnWrap.classList.add('active'); // wrap is on by default
      btnWrap.addEventListener('click', () => {
        const current = aceEditor.getOption('wrap');
        const newWrap = current ? false : true;
        aceEditor.setOption('wrap', newWrap);
        btnWrap.classList.toggle('active', newWrap);
        aceEditor.focus();
      });

      // Toggle Minimap (scrollbar annotations)
      let minimapOn = false;
      const btnMinimap = document.getElementById('btn-minimap');
      btnMinimap.addEventListener('click', () => {
        minimapOn = !minimapOn;
        aceEditor.setOption('showGutter', true);
        // Ace doesn't have a built-in minimap, but we can toggle a useful
        // alternative: show/hide invisible characters + highlight active line
        aceEditor.setOption('showInvisibles', minimapOn);
        aceEditor.setOption('displayIndentGuides', minimapOn);
        aceEditor.setOption('highlightGutterLine', minimapOn);
        btnMinimap.classList.toggle('active', minimapOn);
        aceEditor.focus();
      });

      // --- YAML Validate & Auto Fix ---
      const btnValidate = document.getElementById('btn-validate');
      const btnAutofix = document.getElementById('btn-autofix');

      // Ctrl+Shift+V to validate
      aceEditor.commands.addCommand({
        name: 'validateYaml',
        bindKey: { win: 'Ctrl-Shift-V', mac: 'Cmd-Shift-V' },
        exec: () => validateYaml()
      });

      btnValidate.addEventListener('click', () => validateYaml());
      btnAutofix.addEventListener('click', () => autoFixYaml());

      // --- Strip Escape Characters ---
      document.getElementById('btn-strip-escapes').addEventListener('click', () => {
        const raw = aceEditor.getValue();
        // Remove literal backslash-r and backslash-n sequences (not real newlines)
        const cleaned = raw.replace(/\\r\\n|\\r|\\n/g, '');
        if (cleaned !== raw) {
          const cursorPos = aceEditor.getCursorPosition();
          aceEditor.setValue(cleaned, -1);
          aceEditor.moveCursorToPosition(cursorPos);
          aceEditor.clearSelection();
          checkModified();
          updateLineCount();
          setStatus('modified', 'Escape characters (\\r, \\n) removed');
        } else {
          setStatus('saved', 'No escape characters found');
        }
      });

      // --- Format Selected Value (Toggle: Expand ↔ Collapse) ---
      const btnFormat = document.getElementById('btn-format-values');
      let formatSelectionIsBlock = false; // true when selected block is already expanded

      // Enable/disable button and detect mode based on selection
      aceEditor.selection.on('changeSelection', updateFormatState);
      aceEditor.selection.on('changeCursor', updateFormatState);

      function updateFormatState() {
        const sel = getSelectedBlock();
        if (!sel) {
          btnFormat.disabled = true;
          btnFormat.textContent = '📐 Format';
          btnFormat.title = 'Select a YAML key: value line to format';
          btnFormat.classList.remove('active');
          formatSelectionIsBlock = false;
          return;
        }
        btnFormat.disabled = false;
        if (sel.isBlock) {
          btnFormat.textContent = '📐 Collapse';
          btnFormat.title = 'Collapse this multi-line block back to single line';
          btnFormat.classList.add('active');
          formatSelectionIsBlock = true;
        } else {
          btnFormat.textContent = '📐 Format';
          btnFormat.title = 'Format this value as multi-line (JSON / SQL / text)';
          btnFormat.classList.remove('active');
          formatSelectionIsBlock = false;
        }
      }

      // Analyse the selected line(s) and return block info or null
      function getSelectedBlock() {
        const range = aceEditor.getSelectionRange();
        const startRow = range.start.row;
        const allLines = aceEditor.session.doc.getAllLines();

        // --- Case 1: cursor/selection is on a "key: |" block scalar header ---
        const headerLine = allLines[startRow] || '';
        const blockHeaderMatch = headerLine.trim().match(/^(\S.*?):\s*[|>]-?\s*$/);
        if (blockHeaderMatch) {
          // Collect continuation lines
          let endRow = startRow;
          while (endRow + 1 < allLines.length && /^  /.test(allLines[endRow + 1])) {
            endRow++;
          }
          if (endRow > startRow) {
            return { startRow, endRow, key: blockHeaderMatch[1], isBlock: true };
          }
        }

        // --- Case 2: cursor is inside a block scalar (indented continuation line) ---
        if (/^  /.test(headerLine)) {
          // Walk up to find the block header
          let hRow = startRow - 1;
          while (hRow >= 0 && /^  /.test(allLines[hRow])) hRow--;
          if (hRow >= 0) {
            const hMatch = allLines[hRow].trim().match(/^(\S.*?):\s*[|>]-?\s*$/);
            if (hMatch) {
              let endRow = hRow;
              while (endRow + 1 < allLines.length && /^  /.test(allLines[endRow + 1])) endRow++;
              return { startRow: hRow, endRow, key: hMatch[1], isBlock: true };
            }
          }
        }

        // --- Case 3: single-line "key: value" ---
        const singleMatch = headerLine.trim().match(/^(\S.*?):\s+(.+)$/);
        if (singleMatch && !headerLine.trim().startsWith('#')) {
          const value = singleMatch[2].trim();
          if (value && (value.length >= 40 || looksLikeJson(value) || looksLikeSql(value))) {
            return { startRow, endRow: startRow, key: singleMatch[1], value, isBlock: false };
          }
        }

        return null;
      }

      btnFormat.addEventListener('click', () => {
        const sel = getSelectedBlock();
        if (!sel) return;
        if (sel.isBlock) {
          collapseBlock(sel);
        } else {
          expandBlock(sel);
        }
      });

      function expandBlock(sel) {
        const { startRow, key, value } = sel;
        let formatted = null;
        let label = 'text';

        // Detect & format JSON
        if (looksLikeJson(value)) {
          formatted = tryFormatJson(value);
          if (formatted) label = 'JSON';
        }

        // Detect & format SQL
        if (!formatted && looksLikeSql(value)) {
          formatted = formatSql(value);
          label = 'SQL';
        }

        // Long text fallback
        if (!formatted && value.length >= 40) {
          formatted = wrapText(value, 100).join('\n');
          label = 'text';
        }

        if (!formatted) {
          setStatus('saved', 'Value too short to format');
          return;
        }

        const newLines = [key + ': |'];
        formatted.split('\n').forEach(fl => newLines.push('  ' + fl));
        const replacement = newLines.join('\n');

        const Range = ace.require('ace/range').Range;
        const lineLen = aceEditor.session.getLine(startRow).length;
        const replaceRange = new Range(startRow, 0, startRow, lineLen);
        aceEditor.session.replace(replaceRange, replacement);
        aceEditor.clearSelection();
        checkModified();
        updateLineCount();
        setStatus('modified', 'Expanded ' + label + ' value to multi-line');
      }

      function collapseBlock(sel) {
        const { startRow, endRow, key } = sel;
        const allLines = aceEditor.session.doc.getAllLines();

        // Collect indented lines
        const blockLines = [];
        for (let r = startRow + 1; r <= endRow; r++) {
          blockLines.push(allLines[r].replace(/^  /, ''));
        }
        const joined = blockLines.join(' ').replace(/\s+/g, ' ').trim();
        const replacement = key + ': ' + joined;

        const Range = ace.require('ace/range').Range;
        const lastLineLen = aceEditor.session.getLine(endRow).length;
        const replaceRange = new Range(startRow, 0, endRow, lastLineLen);
        aceEditor.session.replace(replaceRange, replacement);
        aceEditor.clearSelection();
        checkModified();
        updateLineCount();
        setStatus('modified', 'Collapsed value to single line');
      }

      function looksLikeJson(val) {
        const t = val.trim();
        return (t.startsWith('{') && t.endsWith('}')) ||
               (t.startsWith('[') && t.endsWith(']'));
      }

      function tryFormatJson(val) {
        try {
          const obj = JSON.parse(val);
          return JSON.stringify(obj, null, 2);
        } catch (e) {
          return null;
        }
      }

      const SQL_KEYWORDS = /\b(SELECT|FROM|WHERE|AND|OR|JOIN|LEFT JOIN|RIGHT JOIN|INNER JOIN|OUTER JOIN|FULL JOIN|CROSS JOIN|ON|GROUP BY|ORDER BY|HAVING|LIMIT|OFFSET|INSERT INTO|VALUES|UPDATE|SET|DELETE FROM|CREATE TABLE|ALTER TABLE|DROP TABLE|UNION|UNION ALL|CASE|WHEN|THEN|ELSE|END|AS|IN|NOT|BETWEEN|LIKE|IS NULL|IS NOT NULL|EXISTS|DISTINCT|WITH)\b/i;

      function looksLikeSql(val) {
        const upper = val.toUpperCase().trim();
        return (upper.startsWith('SELECT ') || upper.startsWith('INSERT ') ||
                upper.startsWith('UPDATE ') || upper.startsWith('DELETE ') ||
                upper.startsWith('CREATE ') || upper.startsWith('ALTER ') ||
                upper.startsWith('WITH ')) && SQL_KEYWORDS.test(val);
      }

      function formatSql(val) {
        // Keywords that start a new line
        const majorKw = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR',
          'LEFT JOIN', 'RIGHT JOIN', 'INNER JOIN', 'OUTER JOIN',
          'FULL JOIN', 'CROSS JOIN', 'JOIN', 'ON',
          'GROUP BY', 'ORDER BY', 'HAVING', 'LIMIT', 'OFFSET',
          'INSERT INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE FROM',
          'UNION ALL', 'UNION', 'WITH', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END'];

        let sql = val.replace(/\s+/g, ' ').trim();

        // Insert newlines before major keywords (case-insensitive)
        majorKw.forEach(kw => {
          const re = new RegExp('\\s+(' + kw.replace(/ /g, '\\s+') + ')\\b', 'gi');
          sql = sql.replace(re, '\n$1');
        });

        // Indent lines after SELECT, WHERE, etc.
        const lines = sql.split('\n');
        const formatted = [];
        lines.forEach(line => {
          const t = line.trim();
          if (!t) return;
          const upper = t.toUpperCase();
          // Sub-keywords get indented
          if (upper.startsWith('AND ') || upper.startsWith('OR ') ||
              upper.startsWith('ON ') || upper.startsWith('WHEN ') ||
              upper.startsWith('THEN ') || upper.startsWith('ELSE ')) {
            formatted.push('  ' + t);
          } else {
            formatted.push(t);
          }
        });

        return formatted.join('\n');
      }

      function wrapText(text, maxLen) {
        const words = text.split(/\s+/);
        const lines = [];
        let current = '';
        words.forEach(word => {
          if (current.length + word.length + 1 > maxLen && current.length > 0) {
            lines.push(current);
            current = word;
          } else {
            current = current ? current + ' ' + word : word;
          }
        });
        if (current) lines.push(current);
        return lines;
      }

      function validateYaml() {
        const content = aceEditor.getValue();
        const annotations = [];

        // Remove any old badge
        const oldBadge = btnValidate.querySelector('.validate-badge');
        if (oldBadge) oldBadge.remove();
        btnValidate.classList.remove('has-errors');

        // Try parsing with js-yaml
        try {
          jsyaml.load(content, { schema: jsyaml.DEFAULT_SCHEMA });
        } catch (e) {
          if (e.mark) {
            annotations.push({
              row: e.mark.line || 0,
              column: e.mark.column || 0,
              text: e.reason || e.message,
              type: 'error'
            });
          } else {
            annotations.push({
              row: 0,
              column: 0,
              text: e.message,
              type: 'error'
            });
          }
        }

        // Additional lint checks (line-by-line)
        const lines = content.split('\n');
        lines.forEach((line, idx) => {
          // Tab characters
          if (line.includes('\t')) {
            annotations.push({
              row: idx, column: line.indexOf('\t'),
              text: 'Tab character found — use spaces for indentation',
              type: 'warning'
            });
          }
          // Trailing whitespace
          if (/\S/.test(line) && /\s+$/.test(line)) {
            annotations.push({
              row: idx, column: line.length,
              text: 'Trailing whitespace',
              type: 'info'
            });
          }
          // Missing space after colon in key: value
          const kvMatch = line.match(/^(\s*)(\S+):(\S)/);
          if (kvMatch && !line.trimStart().startsWith('#') && !line.trimStart().startsWith('-')) {
            annotations.push({
              row: idx, column: kvMatch[1].length + kvMatch[2].length + 1,
              text: 'Missing space after colon',
              type: 'warning'
            });
          }
          // Inconsistent indentation (odd number of spaces)
          const leadingMatch = line.match(/^( +)/);
          if (leadingMatch && leadingMatch[1].length % 2 !== 0) {
            annotations.push({
              row: idx, column: 0,
              text: 'Odd indentation (' + leadingMatch[1].length + ' spaces) — use multiples of 2',
              type: 'warning'
            });
          }
        });

        // Check for duplicate keys at same level
        try {
          const seen = {};
          lines.forEach((line, idx) => {
            const m = line.match(/^(\s*)(\S+?)\s*:/);
            if (m && !line.trimStart().startsWith('#')) {
              const indent = m[1].length;
              const key = indent + ':' + m[2];
              if (seen[key] !== undefined) {
                annotations.push({
                  row: idx, column: 0,
                  text: 'Duplicate key "' + m[2] + '" (first at line ' + (seen[key] + 1) + ')',
                  type: 'warning'
                });
              } else {
                seen[key] = idx;
              }
            }
          });
        } catch (e) { /* ignore */ }

        aceEditor.session.setAnnotations(annotations);

        // Show badge
        const errorCount = annotations.filter(a => a.type === 'error').length;
        const warnCount = annotations.filter(a => a.type === 'warning').length;
        const badge = document.createElement('span');
        badge.className = 'validate-badge';

        if (errorCount > 0) {
          badge.classList.add('errors');
          badge.textContent = errorCount + ' error' + (errorCount > 1 ? 's' : '') +
            (warnCount > 0 ? ', ' + warnCount + ' warn' : '');
          btnValidate.classList.add('has-errors');
        } else if (warnCount > 0) {
          badge.classList.add('errors');
          badge.textContent = warnCount + ' warning' + (warnCount > 1 ? 's' : '');
        } else {
          badge.classList.add('ok');
          badge.textContent = 'OK';
        }
        btnValidate.appendChild(badge);

        // Jump to first error/warning
        if (annotations.length > 0) {
          aceEditor.gotoLine(annotations[0].row + 1, annotations[0].column, true);
        }

        aceEditor.focus();
        return annotations;
      }

      function autoFixYaml() {
        const raw = aceEditor.getValue();
        const lines = raw.split('\n');
        const fixed = [];
        let prevBlank = false;
        let fixCount = 0;

        lines.forEach(line => {
          let l = line;

          // 1. Replace tabs with 2 spaces
          if (l.includes('\t')) {
            l = l.replace(/\t/g, '  ');
            fixCount++;
          }

          // 2. Trim trailing whitespace
          if (/\S/.test(l) && /\s+$/.test(l)) {
            l = l.replace(/\s+$/, '');
            fixCount++;
          }

          // 3. Collapse multiple consecutive blank lines
          if (l.trim() === '') {
            if (!prevBlank) fixed.push('');
            else fixCount++;
            prevBlank = true;
            return;
          }
          prevBlank = false;

          // 4. Fix missing space after colon (key:value → key: value)
          if (!l.trimStart().startsWith('#') && !l.trimStart().startsWith('-')) {
            const kvMatch = l.match(/^(\s*)(\S+?):(\S.*)$/);
            if (kvMatch) {
              l = kvMatch[1] + kvMatch[2] + ': ' + kvMatch[3];
              fixCount++;
            }
          }

          // 5. Fix odd indentation → round down to even
          const leadingMatch = l.match(/^( +)/);
          if (leadingMatch && leadingMatch[1].length % 2 !== 0) {
            const newIndent = leadingMatch[1].length - 1;
            l = ' '.repeat(newIndent) + l.trimStart();
            fixCount++;
          }

          fixed.push(l);
        });

        // Remove trailing blank lines
        while (fixed.length > 0 && fixed[fixed.length - 1].trim() === '') {
          fixed.pop();
        }

        const result = fixed.join('\n') + '\n';
        const cursorPos = aceEditor.getCursorPosition();
        aceEditor.setValue(result, -1);
        aceEditor.moveCursorToPosition(cursorPos);
        aceEditor.clearSelection();
        checkModified();
        updateLineCount();

        // Run validation after fix to show remaining issues
        const remaining = validateYaml();
        const remainErrors = remaining.filter(a => a.type === 'error').length;

        if (fixCount > 0) {
          setStatus('modified', 'Auto-fixed ' + fixCount + ' issue' + (fixCount > 1 ? 's' : '') +
            (remainErrors > 0 ? ' — ' + remainErrors + ' error' + (remainErrors > 1 ? 's' : '') + ' remain' : ''));
        } else {
          setStatus('saved', 'No issues to fix');
        }
      }

      // Clear annotations on edit (so stale markers don't linger)
      aceEditor.session.on('change', () => {
        const oldBadge = btnValidate.querySelector('.validate-badge');
        if (oldBadge) oldBadge.remove();
        btnValidate.classList.remove('has-errors');
      });

      // Save button click
      saveBtn.addEventListener('click', () => {
        saveSettings();
      });

      // Warn on unsaved changes
      window.addEventListener('beforeunload', (e) => {
        if (isModified) {
          e.preventDefault();
          e.returnValue = '';
        }
      });

      // Initialize
      window.addEventListener('load', () => {
        initEditor();
        initKnowledgeBrowser();
      });

      // ===== Knowledge Browser (server-side pagination, sort, search) =====
      const PAGE_SIZE = 10;
      let currentPage = 0;
      let totalPages = 1;
      let totalElements = 0;
      let currentResults = [];
      let currentSort = 'name';
      let currentDirection = 'asc';
      let currentQuery = '';
      let searchDebounceTimer = null;

      function initKnowledgeBrowser() {
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('search-clear-btn');
         
        // Handler for creating a new knowledge entry
        document.getElementById('create-knowledge-btn').addEventListener('click', function() {
          document.getElementById('knowledge-desc-input').value = '';
          document.getElementById('create-knowledge-error').style.display = 'none';
          document.getElementById('create-knowledge-modal').classList.add('visible');
          setTimeout(() => document.getElementById('knowledge-desc-input').focus(), 100);
        });

        document.getElementById('close-create-knowledge-modal').addEventListener('click', function() {
          document.getElementById('create-knowledge-modal').classList.remove('visible');
        });

        // Helper: switch to Designer view
        function switchToDesignerView() {
          document.getElementById('tab-designer').click();
        }

        // AI Generate button
        document.getElementById('btn-ai-generate').addEventListener('click', async function() {
          const desc = document.getElementById('knowledge-desc-input').value.trim();
          const errorDiv = document.getElementById('create-knowledge-error');
          errorDiv.style.display = 'none';
          if (!desc) {
            errorDiv.textContent = 'Please enter a description.';
            errorDiv.style.display = 'block';
            return;
          }
          try {
            const headers = buildHeaders('text/plain; charset=utf-8');
            setStatus('','Generating YAML from description...');
            const resp = await fetch('/copilot/api/v1/knowledge/create-from-description', {
              method: 'POST',
              headers,
              body: desc
            });
            if (!resp.ok) {
              throw new Error('AI generation failed: ' + resp.status);
            }
            const yaml = await resp.text();
            editor.value = yaml;
            originalContent = yaml;
            loadedKnowledgeName = null;
            setStatus('saved', 'YAML generated from description');
            updateLineCount();
            saveBtn.disabled = false;
            // Update filepath label
            const filepath = document.querySelector('.filepath');
            if (filepath) filepath.textContent = '(new entry)';
            document.getElementById('create-knowledge-modal').classList.remove('visible');
            switchToDesignerView();
            editor.focus();
          } catch (e) {
            errorDiv.textContent = e.message;
            errorDiv.style.display = 'block';
            setStatus('error', 'Failed to generate YAML');
          }
        });

        // Manual button
        document.getElementById('btn-manual-generate').addEventListener('click', function() {
          const desc = document.getElementById('knowledge-desc-input').value.trim();
          const errorDiv = document.getElementById('create-knowledge-error');
          errorDiv.style.display = 'none';
          if (!desc) {
            errorDiv.textContent = 'Please enter a description.';
            errorDiv.style.display = 'block';
            return;
          }
          // Insert sample YAML with description
          const sampleYaml = `# Example knowledgeBase YAML\nknowledgeBase:\n  name: # <name>\n  type: # <type>\n  description: |\n    ${desc.replace(/\n/g,'\n    ')}\n  status: A\n  module: # <module>\n  service: # <service>\n  parameters: # <parameters>\n    # - param_name:\n    #     type: string\n  systemPrompt: |\n    # <system prompt>\n  data: |\n    # <data block>\n  flow: # <flow steps>\n    # - name: <step_name>\n    #   type: SQL\n    #   description: |\n    #     <step description>\n    #   status: S\n    #   module: null\n    #   service: <service>\n    #   parameters:\n    #     param_name:\n    #       - type: number\n    #   systemPrompt: ""\n    #   data: |\n    #     <SQL or other data>\n`;
          editor.value = sampleYaml;
          originalContent = sampleYaml;
          loadedKnowledgeName = null;
          setStatus('saved', 'Sample YAML loaded');
          updateLineCount();
          saveBtn.disabled = false;
          // Update filepath label
          const filepath = document.querySelector('.filepath');
          if (filepath) filepath.textContent = '(new entry)';
          document.getElementById('create-knowledge-modal').classList.remove('visible');
          switchToDesignerView();
          editor.focus();
        });

        document.getElementById('knowledge-btn').addEventListener('click', () => {
          currentPage = 0;
          currentQuery = '';
          currentSort = 'name';
          currentDirection = 'asc';
          searchInput.value = '';
          openModal();
          fetchKnowledgePage(0);
        });

        // Search input with debounce
        searchInput.addEventListener('input', () => {
          clearTimeout(searchDebounceTimer);
          searchDebounceTimer = setTimeout(() => {
            currentQuery = searchInput.value.trim();
            currentPage = 0;
            fetchKnowledgePage(0);
          }, 300);
        });

        // Enter key for immediate search
        searchInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            clearTimeout(searchDebounceTimer);
            currentQuery = searchInput.value.trim();
            currentPage = 0;
            fetchKnowledgePage(0);
          }
        });

        // Clear search
        clearBtn.addEventListener('click', () => {
          searchInput.value = '';
          currentQuery = '';
          currentPage = 0;
          fetchKnowledgePage(0);
          searchInput.focus();
        });

        // Modal close handlers
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
          if (e.target === e.currentTarget) closeModal();
        });
        document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        document.getElementById('page-prev').addEventListener('click', () => {
          if (currentPage > 0) fetchKnowledgePage(currentPage - 1);
        });
        document.getElementById('page-next').addEventListener('click', () => {
          if (currentPage < totalPages - 1) fetchKnowledgePage(currentPage + 1);
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeModal();
        });
      }

      async function fetchKnowledgePage(page) {
        const body = document.getElementById('modal-results');
        body.innerHTML = '<div class="result-empty">Loading…</div>';

        try {
          const headers = { 'Content-Type': 'application/json; charset=utf-8' };
          const jwt = getJwtToken();
          if (jwt) headers['jwttknckey'] = jwt;

          // Use /search when there is a query, otherwise /knowledge (getAll)
          let url;
          if (currentQuery) {
            url = '/copilot/api/v1/knowledge/search?query=' + encodeURIComponent(currentQuery)
              + '&page=' + page + '&size=' + PAGE_SIZE
              + '&sort=' + encodeURIComponent(currentSort)
              + '&direction=' + encodeURIComponent(currentDirection);
          } else {
            url = '/copilot/api/v1/knowledge?page=' + page + '&size=' + PAGE_SIZE
              + '&sort=' + encodeURIComponent(currentSort)
              + '&direction=' + encodeURIComponent(currentDirection);
          }

          const response = await fetch(url, { method: 'GET', headers });

          if (!response.ok) {
            throw new Error('Failed to load knowledge (HTTP ' + response.status + ')');
          }

          const data = await response.json();

          currentResults = data.content || [];
          currentPage = data.number || 0;
          totalPages = data.totalPages || 1;
          totalElements = data.totalElements || 0;

          renderResults();
        } catch (e) {
          console.error('Knowledge load error:', e);
          body.innerHTML = '<div class="result-empty">Error: ' + escapeHtml(e.message) + '</div>';
          currentResults = [];
          totalPages = 1;
          totalElements = 0;
          updatePagination();
        }
      }

      function handleSort(field) {
        if (currentSort === field) {
          currentDirection = currentDirection === 'asc' ? 'desc' : 'asc';
        } else {
          currentSort = field;
          currentDirection = 'asc';
        }
        currentPage = 0;
        fetchKnowledgePage(0);
      }

      function openModal() {
        document.getElementById('modal-title').textContent = 'Select Knowledge Entry';
        document.getElementById('modal-overlay').classList.add('visible');
        setTimeout(() => document.getElementById('search-input').focus(), 100);
      }

      function closeModal() {
        document.getElementById('modal-overlay').classList.remove('visible');
      }

      function updatePagination() {
        const resultCount = document.getElementById('result-count');
        const pageInfo = document.getElementById('page-info');
        const prevBtn = document.getElementById('page-prev');
        const nextBtn = document.getElementById('page-next');

        resultCount.textContent = totalElements + ' entr' + (totalElements !== 1 ? 'ies' : 'y');
        pageInfo.textContent = 'Page ' + (currentPage + 1) + ' of ' + totalPages;
        prevBtn.disabled = currentPage <= 0;
        nextBtn.disabled = currentPage >= totalPages - 1;
      }

      function sortArrow(field) {
        if (currentSort !== field) return '⇅';
        return currentDirection === 'asc' ? '↑' : '↓';
      }

      function sortIndicatorClass(field) {
        return currentSort === field ? 'table-sort-indicator active' : 'table-sort-indicator';
      }

      function renderResults() {
        const body = document.getElementById('modal-results');
        updatePagination();
        body.innerHTML = '';

        if (currentResults.length === 0) {
          body.innerHTML = '<div class="result-empty">No knowledge entries found.</div>';
          return;
        }

        const table = document.createElement('table');
        table.className = 'results-table';

        // Sortable header
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');

        const columns = [
          { label: 'Name', field: 'name' },
          { label: 'Description', field: 'desc' },
          { label: 'Type', field: 'type' }
        ];

        columns.forEach(col => {
          const th = document.createElement('th');
          th.textContent = col.label;
          const indicator = document.createElement('span');
          indicator.className = sortIndicatorClass(col.field);
          indicator.textContent = sortArrow(col.field);
          th.appendChild(indicator);
          th.addEventListener('click', () => handleSort(col.field));
          headerRow.appendChild(th);
        });

        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        currentResults.forEach((item) => {
          const tr = document.createElement('tr');
          tr.className = 'result-row';

          const tdName = document.createElement('td');
          tdName.className = 'col-name';
          tdName.textContent = item.name || 'Unnamed';
          tdName.title = item.name || '';

          const tdDesc = document.createElement('td');
          tdDesc.className = 'col-desc';
          tdDesc.textContent = item.desc || '—';
          tdDesc.title = item.desc || '';

          const tdType = document.createElement('td');
          tdType.className = 'col-type';
          if (item.type) {
            const badge = document.createElement('span');
            badge.className = 'type-badge';
            badge.textContent = item.type;
            tdType.appendChild(badge);
          } else {
            tdType.textContent = '—';
          }

          tr.appendChild(tdName);
          tr.appendChild(tdDesc);
          tr.appendChild(tdType);
          tr.addEventListener('click', () => selectKnowledgeEntry(item));
          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        body.appendChild(table);
      }

      async function selectKnowledgeEntry(item) {
    	  const name = item.name || '';
    	  if (!name) {
    	    alert('Knowledge entry has no name.');
    	    return;
    	  }

    	  // --- Confirm discard unsaved changes ---
    	  if (isModified) {
    	    const discard = confirm('You have unsaved changes to "' + (loadedKnowledgeName || 'current entry') + '".\n\nDiscard changes and load "' + name + '"?');
    	    if (!discard) return;
    	  }

    	  closeModal();
    	  setStatus('', 'Loading ' + name + '…');
    	  editor.disabled = true;

    	  try {
    	    const response = await fetch(
    	      '/copilot/api/v1/knowledge/' + encodeURIComponent(name),
    	      { method: 'GET', headers: buildHeaders() }
    	    );

    	    if (!response.ok) {
    	        let errorMsg = 'Failed to load knowledge (HTTP ' + response.status + ')';
    	        try {
    	            const contentType = response.headers.get('content-type') || '';
    	            if (contentType.includes('application/json')) {
    	                const errorBody = await response.json();
    	                errorMsg = errorBody.error || errorBody.message || errorMsg;
    	            } else {
    	                const text = await response.text();
    	                if (text) errorMsg = text;
    	            }
    	        } catch (parseErr) { }
    	        throw new Error(errorMsg);
    	    }

    	    const yaml = await response.text();

    	    editor.value = yaml;
    	    originalContent = yaml;
    	    loadedKnowledgeName = name;
    	    isModified = false;
    	    saveBtn.disabled = false;
    	    setStatus('saved', 'Loaded: ' + name);
    	    updateLineCount();

    	    // Update toolbar filepath to show loaded entry name
    	    const filepath = document.querySelector('.filepath');
    	    if (filepath) {
    	      filepath.textContent = name + (item.type ? ' (' + item.type + ')' : '');
    	    }

    	    // Auto-switch to Designer tab and render
    	    activateDesignerTab();
    	  } catch (e) {
    	    console.error('Error loading knowledge:', e);
    	    setStatus('error', 'Error: ' + e.message);
    	  } finally {
    	    editor.disabled = false;
    	  }
    	}

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // ===== View Tab Switching =====
      const tabYaml = document.getElementById('tab-yaml');
      const tabDesigner = document.getElementById('tab-designer');
      const yamlPanel = document.getElementById('yaml-panel');
      const designerPanel = document.getElementById('designer-panel');

      function activateYamlTab() {
        tabYaml.classList.add('active');
        tabDesigner.classList.remove('active');
        yamlPanel.style.display = 'flex';
        designerPanel.style.display = 'none';
        aceEditor.resize();
      }

      function activateDesignerTab() {
        tabDesigner.classList.add('active');
        tabYaml.classList.remove('active');
        yamlPanel.style.display = 'none';
        designerPanel.style.display = 'flex';
        renderDesigner();
      }

      tabYaml.addEventListener('click', () => activateYamlTab());
      tabDesigner.addEventListener('click', () => activateDesignerTab());

      // ===== QueryType enum options for dropdowns =====
      const QUERY_TYPE_OPTIONS = [
        { value: '', label: '— Select Type —' },
        { value: 'UNKNOWN', label: 'UNKNOWN' },
        { value: 'SQL', label: 'SQL' },
        { value: 'REST', label: 'REST' },
        { value: 'SYMPHONY', label: 'SYMPHONY' },
        { value: 'GRAPHQL', label: 'GRAPHQL' },
        { value: 'PLUGIN', label: 'PLUGIN' },
        { value: 'TOOL', label: 'TOOL' },
        { value: 'VELOCITY', label: 'VELOCITY' },
        { value: 'FILE', label: 'FILE' },
        { value: 'SHAREPOINT', label: 'SHAREPOINT' },
        { value: 'RFC', label: 'RFC' }
      ];

      // ===== Designer Rendering =====
      function renderDesigner() {
        const yamlStr = aceEditor.getValue();
        const emptyEl = document.getElementById('designer-empty');
        const contentEl = document.getElementById('designer-content');

        if (!yamlStr || !yamlStr.trim()) {
          emptyEl.textContent = 'Load a knowledge entry to see the visual flow designer.';
          emptyEl.style.display = '';
          contentEl.style.display = 'none';
          return;
        }

        let doc;
        try {
          doc = jsyaml.load(yamlStr);
        } catch (e) {
          emptyEl.textContent = 'Cannot parse YAML: ' + e.message;
          emptyEl.style.display = '';
          contentEl.style.display = 'none';
          return;
        }

        if (!doc || typeof doc !== 'object') {
          emptyEl.textContent = 'YAML parsed but no structured data found. Make sure a knowledge entry is loaded.';
          emptyEl.style.display = '';
          contentEl.style.display = 'none';
          return;
        }

        // Support: top-level knowledgeBase, or direct object with name/flow
        let kb = null;
        if (doc.knowledgeBase && typeof doc.knowledgeBase === 'object') {
          kb = doc.knowledgeBase;
        } else if (doc.name || doc.flow) {
          kb = doc;
        } else {
          // Try to find any key that looks like a knowledge base
          const keys = Object.keys(doc);
          for (const k of keys) {
            const val = doc[k];
            if (val && typeof val === 'object' && (val.name || val.flow)) {
              kb = val;
              break;
            }
          }
        }

        if (!kb) {
          emptyEl.textContent = 'No knowledge base structure detected. Load a knowledge entry to see the designer.';
          emptyEl.style.display = '';
          contentEl.style.display = 'none';
          return;
        }

        emptyEl.style.display = 'none';
        contentEl.style.display = '';
        contentEl.innerHTML = '';

        // --- Parse data.Flow for pipeline definition ---
        let pipelineFlow = [];
        let dataUserPrompt = '';
        let dataSystemPrompt = '';
        let dataIsJson = false;
        if (kb.data) {
          try {
            let dataObj = kb.data;
            if (typeof dataObj === 'string') {
              let cleaned = dataObj
                .replace(/\\r\\n/g, '')  // literal four-char \r\n
                .replace(/\\r/g, '')      // literal two-char \r
                .replace(/\\n/g, '')      // literal two-char \n
                .replace(/\r\n/g, '')     // real CRLF
                .replace(/\r/g, '')       // real CR
                .replace(/\n/g, ' ')      // real LF → space
                .trim();
              console.log('Designer: cleaned data JSON:', cleaned.substring(0, 200));
              dataObj = JSON.parse(cleaned);
              dataIsJson = true;
            }
            if (dataObj && dataObj.Flow && Array.isArray(dataObj.Flow)) {
              pipelineFlow = dataObj.Flow;
            }
            if (dataObj && dataObj.UserPrompt) dataUserPrompt = dataObj.UserPrompt;
            if (dataObj && dataObj.SystemPrompt) dataSystemPrompt = dataObj.SystemPrompt;
          } catch (e) {
            console.warn('Designer: data field not parseable as JSON:', e.message, '\nRaw data:', String(kb.data).substring(0, 300));
          }
        }

        const pipelineNames = pipelineFlow.map(f => f.Name || f.name);
        const flowItems = Array.isArray(kb.flow) ? kb.flow : [];
        const hasFlow = flowItems.length > 0 || pipelineFlow.length > 0;

        // --- Prepare parameters string for editing ---
        let paramsStr = '';
        if (kb.parameters) {
          try {
            paramsStr = (typeof kb.parameters === 'string') ? kb.parameters : jsyaml.dump(kb.parameters, { lineWidth: -1, noRefs: true }).trim();
          } catch (e) { paramsStr = String(kb.parameters); }
        }

        // --- Knowledge Base header card ---
        const headerCard = document.createElement('div');
        headerCard.className = 'kb-header-card';
        headerCard.innerHTML =
          '<h3>' + escapeHtml(kb.name || 'Untitled') + '</h3>' +
          '<div class="kb-meta">' +
            (kb.type ? '<span class="kb-meta-tag">' + escapeHtml(kb.type) + '</span>' : '') +
            (kb.module ? '<span class="kb-meta-tag">Module: ' + escapeHtml(kb.module) + '</span>' : '') +
            (kb.service ? '<span class="kb-meta-tag">Service: ' + escapeHtml(kb.service) + '</span>' : '') +
            (kb.status ? '<span class="kb-meta-tag">Status: ' + escapeHtml(kb.status) + '</span>' : '') +
          '</div>' +
          (kb.description ? '<div style="font-size:13px;color:#57606a;margin-top:8px;">' + escapeHtml(kb.description) + '</div>' : '');

        // Data preview for simple (non-flow) entries
        if (!hasFlow && kb.data && !dataIsJson) {
          const dataPre = document.createElement('div');
          dataPre.className = 'kb-prompt-preview';
          dataPre.style.marginTop = '8px';
          dataPre.innerHTML = '<strong style="font-size:11px;text-transform:uppercase;letter-spacing:0.3px;color:#0969da;">Data / Query</strong>';
          const dataCode = document.createElement('pre');
          dataCode.style.cssText = 'margin:4px 0 0;white-space:pre-wrap;word-break:break-all;font-size:12px;';
          dataCode.textContent = String(kb.data).trim();
          dataPre.appendChild(dataCode);
          headerCard.appendChild(dataPre);
        }

        // Parameters preview for simple entries
        if (!hasFlow && paramsStr) {
          const paramPre = document.createElement('div');
          paramPre.className = 'kb-prompt-preview';
          paramPre.style.marginTop = '8px';
          paramPre.innerHTML = '<strong style="font-size:11px;text-transform:uppercase;letter-spacing:0.3px;color:#0969da;">Parameters</strong>';
          const paramCode = document.createElement('pre');
          paramCode.style.cssText = 'margin:4px 0 0;white-space:pre-wrap;word-break:break-all;font-size:12px;';
          paramCode.textContent = paramsStr;
          paramPre.appendChild(paramCode);
          headerCard.appendChild(paramPre);
        }

        // Build edit form fields — include data + parameters for non-flow entries
        const headerFields = [
          { key: 'name', label: 'Name', value: kb.name || '', type: 'text' },
          { key: 'description', label: 'Description', value: kb.description || '', type: 'text' },
          { key: 'type', label: 'Type', value: kb.type || '', type: 'select', options: QUERY_TYPE_OPTIONS },
          { key: 'module', label: 'Module', value: kb.module || '', type: 'text' },
          { key: 'service', label: 'Service', value: kb.service || '', type: 'text' },
          { key: 'status', label: 'Status', value: kb.status || '', type: 'text' }
        ];
        if (!hasFlow) {
          // Add systemPrompt, data and parameters fields for simple (non-flow) entries
          headerFields.push({ key: 'systemPrompt', label: 'System Prompt', value: kb.systemPrompt || '', type: 'textarea' });
          headerFields.push({ key: 'data', label: 'Data / Query', value: (kb.data != null ? String(kb.data) : ''), type: 'textarea' });
          headerFields.push({ key: 'parameters', label: 'Parameters', value: paramsStr, type: 'textarea' });
        }

        // Edit button for KB header
        const hdrEditBtn = document.createElement('button');
        hdrEditBtn.className = 'flow-block-edit-btn';
        hdrEditBtn.textContent = '✏️ Edit';
        headerCard.appendChild(hdrEditBtn);

        // Track usedBy data for shared-edit warning
        let hdrUsedByData = null;

        const hdrForm = buildEditForm({
          fields: headerFields,
          onSave: (vals) => applyEditToYaml(null, vals),
          onCancel: () => { hdrForm.classList.remove('open'); hdrEditBtn.classList.remove('editing'); hdrEditBtn.textContent = '✏️ Edit'; }
        });
        headerCard.appendChild(hdrForm);

        hdrEditBtn.addEventListener('click', () => {
          const opts = hdrForm._editOpts;
          if (!opts) return;

          function proceedWithEdit() {
            openEditModal(
              'Edit Knowledge Base — ' + (kb.name || 'Untitled'),
              opts.fields,
              (vals) => { opts.onSave(vals); },
              opts.onCancel
            );
          }

          // Warn if this knowledge is used by more than one component
          if (hdrUsedByData && hdrUsedByData.length > 1) {
            const names = hdrUsedByData.map(u => '  • ' + (u.name || 'unnamed')).join('\n');
            const proceed = confirm(
              '⚠️ Shared Knowledge Warning\n\n' +
              '"' + (kb.name || 'This entry') + '" is used by ' + hdrUsedByData.length + ' components:\n\n' +
              names + '\n\n' +
              'Changes will affect ALL of them. Continue editing?'
            );
            if (!proceed) return;
          }
          proceedWithEdit();
        });

        // For simple (non-flow) entries, auto-open the edit modal
        if (!hasFlow) {
          setTimeout(() => { hdrEditBtn.click(); }, 200);
        }

        contentEl.appendChild(headerCard);

        // --- "Used By" section for non-flow (single) entries ---
        if (!hasFlow && kb.name) {
          const usedByCard = document.createElement('div');
          usedByCard.className = 'flow-block-usedby';
          usedByCard.style.marginTop = '12px';
          usedByCard.innerHTML = '<div class="flow-block-usedby-label">🔗 Used By</div>' +
            '<div class="flow-block-usedby-loading">Loading…</div>';
          contentEl.appendChild(usedByCard);

          fetch('/copilot/api/v1/knowledge/' + encodeURIComponent(kb.name) + '/usedby')
            .then(res => res.ok ? res.json() : Promise.reject('HTTP ' + res.status))
            .then(data => {
              // Store for shared-edit warning
              hdrUsedByData = data || [];

              const loadingEl = usedByCard.querySelector('.flow-block-usedby-loading');
              if (!data || data.length === 0) {
                loadingEl.className = 'flow-block-usedby-empty';
                loadingEl.textContent = 'Not referenced by any flow';
                return;
              }

              // Update edit button badge if shared
              if (data.length > 1) {
                hdrEditBtn.textContent = '⚠️ Edit (shared)';
                hdrEditBtn.title = 'This knowledge is used by ' + data.length + ' components';
              }

              const ul = document.createElement('ul');
              ul.className = 'flow-block-usedby-list';
              data.forEach(item => {
                const li = document.createElement('li');
                const isCurrent = (item.name === loadedKnowledgeName);
                if (isCurrent) li.classList.add('usedby-current');
                li.innerHTML =
                  '<span class="usedby-name">' + escapeHtml(item.name || '') + '</span>' +
                  '<span style="color:#57606a;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(item.description || '') + '</span>' +
                  (item.status ? '<span class="usedby-status">' + escapeHtml(item.status) + '</span>' : '') +
                  '<span class="usedby-load-icon">' + (isCurrent ? '✔ loaded' : '↗ load') + '</span>';
                li.title = isCurrent ? 'Currently loaded' : 'Click to load "' + (item.name || '') + '"';
                li.addEventListener('click', function(e) {
                  e.stopPropagation();
                  if (item.name && item.name !== loadedKnowledgeName) {
                    selectKnowledgeEntry({ name: item.name, desc: item.description || '', type: item.type || '' });
                  }
                });
                ul.appendChild(li);
              });
              loadingEl.replaceWith(ul);
            })
            .catch(err => {
              const loadingEl = usedByCard.querySelector('.flow-block-usedby-loading');
              if (loadingEl) {
                loadingEl.className = 'flow-block-usedby-empty';
                loadingEl.textContent = 'Could not load usage info';
              }
              console.warn('UsedBy fetch failed for ' + kb.name + ':', err);
            });
        }

        // --- For simple (non-flow) entries, stop here ---
        if (!hasFlow) {
          return;
        }

        // ===== DATA PIPELINE VISUALIZATION =====

        // Group pipeline steps by Order (items with same Order run in parallel)
        const orderGroups = [];
        const orderMap = new Map();
        pipelineFlow.forEach((pf, idx) => {
          const order = pf.Order || pf.order || (idx + 1);
          if (!orderMap.has(order)) {
            const group = { order: order, items: [] };
            orderMap.set(order, group);
            orderGroups.push(group);
          }
          orderMap.get(order).items.push({ pf, origIdx: idx });
        });
        // Sort groups by order value
        orderGroups.sort((a, b) => a.order - b.order);

        const totalSteps = pipelineFlow.length;
        const totalGroups = orderGroups.length;
        const hasParallel = orderGroups.some(g => g.items.length > 1);

        const pipeLabel = document.createElement('div');
        pipeLabel.className = 'pipeline-label';
        pipeLabel.innerHTML = '⚡ Execution Pipeline (' + totalSteps + ' step' + (totalSteps !== 1 ? 's' : '') +
          (hasParallel ? ', ' + totalGroups + ' group' + (totalGroups !== 1 ? 's' : '') : '') + ')';
        contentEl.appendChild(pipeLabel);

        const pipeContainer = document.createElement('div');
        pipeContainer.className = 'flow-blocks-container';

        // --- INPUT terminal (editable) ---
        const inputBlock = document.createElement('div');
        inputBlock.className = 'input-terminal-block';

        const inputHeader = document.createElement('div');
        inputHeader.className = 'input-terminal-header';
        inputHeader.innerHTML = '<span class="terminal-icon">📥</span> INPUT' +
          '<span class="input-edit-hint">▼ click to edit</span>';
        inputBlock.appendChild(inputHeader);

        const inputBody = document.createElement('div');
        inputBody.className = 'input-terminal-body';

        // Show current parameters as readable YAML text
        if (paramsStr) {
          const paramsPre = document.createElement('pre');
          paramsPre.className = 'input-params-preview';
          paramsPre.textContent = paramsStr;
          inputBody.appendChild(paramsPre);
        } else {
          inputBody.innerHTML = '<div class="input-no-params">No input parameters defined</div>';
        }

        // Show UserPrompt preview if present
        if (dataUserPrompt) {
          const upLabel = document.createElement('div');
          upLabel.style.cssText = 'font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;color:#1a7f37;margin-top:10px;margin-bottom:4px;';
          upLabel.textContent = 'User Prompt';
          inputBody.appendChild(upLabel);
          const upPre = document.createElement('pre');
          upPre.className = 'input-params-preview';
          upPre.textContent = dataUserPrompt;
          inputBody.appendChild(upPre);
        }

        // Edit form for parameters + user prompt
        const inputEditForm = buildEditForm({
          fields: [
            { key: 'parameters', label: 'Parameters (YAML)', value: paramsStr, type: 'textarea' },
            { key: 'userPrompt', label: 'User Prompt', value: dataUserPrompt, type: 'textarea' }
          ],
          onSave: (vals) => applyEditToYaml(null, vals),
          onCancel: () => {
            inputEditForm.classList.remove('open');
            inputHeader.querySelector('.input-edit-hint').textContent = '▼ click to edit';
          }
        });
        inputBody.appendChild(inputEditForm);
        inputBlock.appendChild(inputBody);

        // Open edit modal on header click
        inputHeader.addEventListener('click', () => {
          const opts = inputEditForm._editOpts;
          if (opts) {
            openEditModal(
              'Edit Input Parameters',
              opts.fields,
              (vals) => { opts.onSave(vals); },
              opts.onCancel
            );
          }
        });

        pipeContainer.appendChild(inputBlock);

        // Helper: build a single flow block element
        function buildFlowBlock(pf, origIdx) {
          const stepName = pf.Name || pf.name || 'Step ' + (origIdx + 1);
          const stepPayload = pf.Payload || pf.payload || '';
          const stepOrder = pf.Order || pf.order || (origIdx + 1);
          const payloadSources = stepPayload.split(',').map(s => s.trim()).filter(Boolean);
          const detail = flowItems.find(f => f.name === stepName);

          const block = document.createElement('div');
          block.className = 'flow-block';
          block.setAttribute('draggable', 'true');
          block.dataset.index = origIdx;
          block.dataset.name = stepName;
          block.dataset.order = String(stepOrder);

          const typeStr = detail ? (detail.type || '?') : '?';
          const typeClass = typeStr.toUpperCase() === 'SQL' ? ' type-sql' : '';

          block.innerHTML = '<div class="flow-block-handle"></div>';

          // Header row — name only
          block.innerHTML +=
            '<div class="flow-block-header">' +
              '<div style="display:flex;align-items:center;">' +
                '<span class="flow-block-order">' + (origIdx + 1) + '</span>' +
                '<span class="flow-block-name">' + escapeHtml(stepName) + '</span>' +
              '</div>' +
            '</div>';

          // Description from detail
          if (detail && detail.description) {
            block.innerHTML += '<div class="flow-block-desc">' + escapeHtml(String(detail.description).trim()) + '</div>';
          }

          // All meta badges in one row: Type, Payload, Service, Status, Params
          const metaTags = [];
          metaTags.push('<span class="kb-meta-tag' + typeClass + '">' + escapeHtml(typeStr) + '</span>');
          if (payloadSources.length > 0) {
            payloadSources.forEach(src => {
              metaTags.push('<span class="payload-badge">⇠ ' + escapeHtml(src) + '</span>');
            });
          }
          if (detail) {
            if (detail.service) metaTags.push('<span class="kb-meta-tag">Service: ' + escapeHtml(detail.service) + '</span>');
            if (detail.status) metaTags.push('<span class="kb-meta-tag">Status: ' + escapeHtml(detail.status) + '</span>');
            if (detail.parameters) {
              const paramKeys = Object.keys(detail.parameters);
              if (paramKeys.length > 0) metaTags.push('<span class="kb-meta-tag">Params: ' + escapeHtml(paramKeys.join(', ')) + '</span>');
            }
          }
          block.innerHTML += '<div class="kb-meta" style="margin-bottom:6px;">' + metaTags.join('') + '</div>';

          // Data preview (SQL / JSON / text) from detail
          if (detail && detail.data) {
            const dataStr = String(detail.data).trim();
            const previewId = 'flow-data-preview-' + origIdx;
            block.innerHTML +=
              '<div class="flow-block-data-preview" id="' + previewId + '">' + escapeHtml(dataStr) + '</div>' +
              '<span class="flow-block-toggle" data-target="' + previewId + '">Show more</span>';
          }

          // --- Edit button ---
          const editBtn = document.createElement('button');
          editBtn.className = 'flow-block-edit-btn';
          editBtn.textContent = '✏️ Edit';
          block.appendChild(editBtn);

          // Track usedBy data for shared-edit warning
          let stepUsedByData = null;

          // Build payload options: 'input' + all other step names
          const payloadOptions = [
            { value: 'input', label: 'input' },
            ...pipelineNames.filter(n => n !== stepName).map(n => ({ value: n, label: n }))
          ];

          const editForm = buildEditForm({
            fields: [
              { key: 'name', label: 'Name', value: stepName, type: 'text' },
              { key: 'order', label: 'Order', value: String(stepOrder), type: 'text', hint: 'Steps with same order run in parallel' },
              { key: 'payload', label: 'Payload', value: stepPayload, type: 'multiselect', options: payloadOptions },
              { key: 'type', label: 'Type', value: detail ? (detail.type || '') : '', type: 'select', options: QUERY_TYPE_OPTIONS },
              { key: 'description', label: 'Description', value: detail ? (String(detail.description || '').trim()) : '', type: 'text' },
              { key: 'status', label: 'Status', value: detail ? (detail.status || '') : '', type: 'text' },
              { key: 'service', label: 'Service', value: detail ? (detail.service || '') : '', type: 'text' },
              { key: 'data', label: 'Data / SQL', value: detail ? (String(detail.data || '').trim()) : '', type: 'textarea' }
            ],
            onSave: (vals) => applyEditToYaml(stepName, vals),
            onCancel: () => { editForm.classList.remove('open'); editBtn.classList.remove('editing'); }
          });
          block.appendChild(editForm);

          editBtn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            const opts = editForm._editOpts;
            if (!opts) return;

            function proceedWithStepEdit() {
              openEditModal(
                'Edit Flow Step — ' + stepName,
                opts.fields,
                (vals) => { opts.onSave(vals); },
                opts.onCancel
              );
            }

            // Warn if this step is used by more than one component
            if (stepUsedByData && stepUsedByData.length > 1) {
              const names = stepUsedByData.map(u => '  • ' + (u.name || 'unnamed')).join('\n');
              const proceed = confirm(
                '⚠️ Shared Step Warning\n\n' +
                '"' + stepName + '" is used by ' + stepUsedByData.length + ' components:\n\n' +
                names + '\n\n' +
                'Changes will affect ALL of them. Continue editing?'
              );
              if (!proceed) return;
            }
            proceedWithStepEdit();
          });

          // --- "Used By" section: fetch and display where this knowledge is referenced ---
          const usedByDiv = document.createElement('div');
          usedByDiv.className = 'flow-block-usedby';
          usedByDiv.innerHTML = '<div class="flow-block-usedby-label">🔗 Used By</div>' +
            '<div class="flow-block-usedby-loading">Loading…</div>';
          block.appendChild(usedByDiv);

          fetch('/copilot/api/v1/knowledge/' + encodeURIComponent(stepName) + '/usedby')
            .then(res => res.ok ? res.json() : Promise.reject('HTTP ' + res.status))
            .then(data => {
              // Store for shared-edit warning
              stepUsedByData = data || [];

              // Update edit button badge if shared
              if (data && data.length > 1) {
                editBtn.textContent = '⚠️ Edit (shared)';
                editBtn.title = 'This step is used by ' + data.length + ' components';
              }
