              const listContainer = usedByDiv.querySelector('.flow-block-usedby-loading');
              if (!data || data.length === 0) {
                listContainer.className = 'flow-block-usedby-empty';
                listContainer.textContent = 'Not referenced by any flow';
                return;
              }
              const ul = document.createElement('ul');
              ul.className = 'flow-block-usedby-list';
              data.forEach(item => {
                const li = document.createElement('li');
                const isCurrent = (item.name === loadedKnowledgeName);
                if (isCurrent) li.classList.add('usedby-current');
                li.innerHTML =
                  '<span class="usedby-name">' + escapeHtml(item.name || '') + '</span>' +
                  '<span style="color:#57606a;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(item.description || '') + '</span>' +
                  (item.status ? '<span class="usedby-status">' + escapeHtml(item.status) + '</span>' : '') +
                  '<span class="usedby-load-icon">' + (isCurrent ? '✔ loaded' : '↗ load') + '</span>';
                li.title = isCurrent ? 'Currently loaded' : 'Click to load "' + (item.name || '') + '"';
                li.addEventListener('click', function(e) {
                  e.stopPropagation();
                  if (item.name && item.name !== loadedKnowledgeName) {
                    selectKnowledgeEntry({ name: item.name, desc: item.description || '', type: item.type || '' });
                  }
                });
                ul.appendChild(li);
              });
              listContainer.replaceWith(ul);
            })
            .catch(err => {
              const listContainer = usedByDiv.querySelector('.flow-block-usedby-loading');
              if (listContainer) {
                listContainer.className = 'flow-block-usedby-empty';
                listContainer.textContent = 'Could not load usage info';
              }
              console.warn('UsedBy fetch failed for ' + stepName + ':', err);
            });

          return block;
        }

        // --- Render each order group ---
        orderGroups.forEach((group, gIdx) => {
          // Connector between groups
          const conn = document.createElement('div');
          conn.className = 'flow-connector';
          conn.textContent = '⬇';
          // Store adjacent orders for "insert between" logic
          if (gIdx > 0) {
            conn.dataset.orderBefore = String(orderGroups[gIdx - 1].order);
          }
          conn.dataset.orderAfter = String(group.order);
          conn.dataset.dropZone = 'connector';
          pipeContainer.appendChild(conn);

          if (group.items.length === 1) {
            // Single step — render directly
            const { pf, origIdx } = group.items[0];
            pipeContainer.appendChild(buildFlowBlock(pf, origIdx));
          } else {
            // Parallel group — render in a lane
            const lane = document.createElement('div');
            lane.className = 'parallel-group';
            lane.dataset.order = String(group.order);
            lane.dataset.dropZone = 'parallel';

            const label = document.createElement('div');
            label.className = 'parallel-group-label';
            label.innerHTML = '⚡ Parallel Group · Order ' + group.order +
              ' <span class="parallel-badge">' + group.items.length + ' parallel</span>';
            lane.appendChild(label);

            const laneInner = document.createElement('div');
            laneInner.className = 'parallel-lane';

            group.items.forEach(({ pf, origIdx }) => {
              laneInner.appendChild(buildFlowBlock(pf, origIdx));
            });

            lane.appendChild(laneInner);
            pipeContainer.appendChild(lane);
          }
        });

        // --- Connector before OUTPUT ---
        if (pipelineFlow.length > 0) {
          const connOut = document.createElement('div');
          connOut.className = 'flow-connector';
          connOut.textContent = '⬇';
          pipeContainer.appendChild(connOut);
        }

        // --- OUTPUT terminal (editable — systemPrompt) ---
        const outputBlock = document.createElement('div');
        outputBlock.className = 'output-terminal-block';

        const outputHeader = document.createElement('div');
        outputHeader.className = 'output-terminal-header';
        outputHeader.innerHTML = '<span class="terminal-icon">📤</span> OUTPUT → AI Prompt Processing' +
          '<span class="output-edit-hint">▼ click to edit</span>';
        outputBlock.appendChild(outputHeader);

        const outputBody = document.createElement('div');
        outputBody.className = 'output-terminal-body';

        // Show system prompt preview
        if (kb.systemPrompt) {
          const promptPre = document.createElement('pre');
          promptPre.className = 'output-prompt-preview';
          promptPre.textContent = kb.systemPrompt;
          outputBody.appendChild(promptPre);
        } else {
          outputBody.innerHTML = '<div class="output-no-prompt">No system prompt defined</div>';
        }

        // Show data-level system prompt if present
        if (dataSystemPrompt) {
          const metaDiv = document.createElement('div');
          metaDiv.style.cssText = 'margin-top:8px;';
          metaDiv.innerHTML = '<div class="kb-meta"><span class="kb-meta-tag">Data SystemPrompt: ' + escapeHtml(dataSystemPrompt) + '</span></div>';
          outputBody.appendChild(metaDiv);
        }

        // Edit form for system prompt
        const outputEditForm = buildEditForm({
          fields: [
            { key: 'systemPrompt', label: 'System Prompt', value: kb.systemPrompt || '', type: 'textarea' }
          ],
          onSave: (vals) => applyEditToYaml(null, vals),
          onCancel: () => {
            outputEditForm.classList.remove('open');
            outputHeader.querySelector('.output-edit-hint').textContent = '▼ click to edit';
          }
        });
        outputBody.appendChild(outputEditForm);
        outputBlock.appendChild(outputBody);

        // Open edit modal on header click
        outputHeader.addEventListener('click', () => {
          const opts = outputEditForm._editOpts;
          if (opts) {
            openEditModal(
              'Edit Output — System Prompt',
              opts.fields,
              (vals) => { opts.onSave(vals); },
              opts.onCancel
            );
          }
        });

        pipeContainer.appendChild(outputBlock);

        contentEl.appendChild(pipeContainer);

        // --- Toggle show more/less ---
        contentEl.querySelectorAll('.flow-block-toggle').forEach(toggle => {
          toggle.addEventListener('click', () => {
            const target = document.getElementById(toggle.dataset.target);
            if (!target) return;
            target.classList.toggle('expanded');
            toggle.textContent = target.classList.contains('expanded') ? 'Show less' : 'Show more';
          });
        });

        // --- Drag and Drop reordering ---
        initFlowDragDrop(pipeContainer, pipelineFlow.map(pf => pf.Name || pf.name));
      }

      // ===== Edit Modal Manager =====
      let _editModalOnSave = null;
      let _editModalOnCancel = null;

      // Close multiselect dropdowns when clicking outside
      document.addEventListener('click', () => {
        document.querySelectorAll('.multiselect-dropdown.open').forEach(d => d.classList.remove('open'));
        document.querySelectorAll('.multiselect-display.open').forEach(d => d.classList.remove('open'));
      });

      function openEditModal(title, fields, onSave, onCancel) {
        const overlay = document.getElementById('edit-modal-overlay');
        const titleEl = document.getElementById('edit-modal-title');
        const body = document.getElementById('edit-modal-body');

        titleEl.textContent = title || 'Edit';
        body.innerHTML = '';

        fields.forEach(f => {
          const row = document.createElement('div');
          row.className = 'edit-modal-row';
          // Textarea rows get flex-grow to fill available space
          if (f.type === 'textarea') {
            row.classList.add('edit-modal-row-flex');
          }

          const label = document.createElement('label');
          label.className = 'edit-modal-label';
          label.textContent = f.label;

          let input;
          if (f.type === 'textarea') {
            input = document.createElement('textarea');
            input.className = 'edit-modal-input';
            input.value = f.value;

            // --- Add Strip Escapes & Format toolbar above each textarea ---
            const toolbar = document.createElement('div');
            toolbar.className = 'edit-modal-textarea-toolbar';

            const btnStrip = document.createElement('button');
            btnStrip.type = 'button';
            btnStrip.className = 'ta-tool-btn';
            btnStrip.textContent = '🧹 Strip Escapes';
            btnStrip.title = 'Remove literal \\r \\n escape sequences';

            const btnFmt = document.createElement('button');
            btnFmt.type = 'button';
            btnFmt.className = 'ta-tool-btn';
            btnFmt.textContent = '📐 Format';
            btnFmt.title = 'Auto-format JSON / SQL / long text in this field';

            const statusSpan = document.createElement('span');
            statusSpan.className = 'ta-tool-status';

            toolbar.appendChild(btnStrip);
            toolbar.appendChild(btnFmt);
            toolbar.appendChild(statusSpan);

            // Strip Escapes handler
            btnStrip.addEventListener('click', () => {
              const raw = input.value;
              const cleaned = raw.replace(/\\r\\n|\\r|\\n/g, '');
              if (cleaned !== raw) {
                input.value = cleaned;
                statusSpan.textContent = '✓ Escape characters removed';
              } else {
                statusSpan.textContent = 'No escape characters found';
              }
              setTimeout(() => { statusSpan.textContent = ''; }, 3000);
            });

            // Format handler
            btnFmt.addEventListener('click', () => {
              const val = input.value.trim();
              if (!val) { statusSpan.textContent = 'Nothing to format'; setTimeout(() => { statusSpan.textContent = ''; }, 3000); return; }
              let formatted = null;
              let label = '';
              if (looksLikeJson(val)) {
                formatted = tryFormatJson(val);
                if (formatted) label = 'JSON';
              }
              if (!formatted && looksLikeSql(val)) {
                formatted = formatSql(val);
                label = 'SQL';
              }
              if (!formatted && val.length >= 40) {
                formatted = wrapText(val, 100).join('\n');
                label = 'text';
              }
              if (formatted) {
                input.value = formatted;
                statusSpan.textContent = '✓ Formatted as ' + label;
              } else {
                statusSpan.textContent = 'Value too short or unrecognized format';
              }
              setTimeout(() => { statusSpan.textContent = ''; }, 3000);
            });

            row.appendChild(label);
            row.appendChild(toolbar);
            row.appendChild(input);
            if (f.hint) {
              const hint = document.createElement('div');
              hint.className = 'edit-modal-hint';
              hint.textContent = f.hint;
              row.appendChild(hint);
            }
            input.dataset.fieldKey = f.key;
            body.appendChild(row);
            return; // skip the default append logic below
          } else if (f.type === 'select' && Array.isArray(f.options)) {
            input = document.createElement('select');
            input.className = 'edit-modal-input';
            f.options.forEach(opt => {
              const option = document.createElement('option');
              option.value = opt.value;
              option.textContent = opt.label;
              if (opt.value === f.value || opt.value.toUpperCase() === (f.value || '').toUpperCase()) {
                option.selected = true;
              }
              input.appendChild(option);
            });
          } else if (f.type === 'multiselect' && Array.isArray(f.options)) {
            // Build multiselect chip-based dropdown
            const currentVals = (f.value || '').split(',').map(s => s.trim()).filter(Boolean);
            const wrapper = document.createElement('div');
            wrapper.className = 'multiselect-wrapper';
            wrapper.dataset.fieldKey = f.key;
            wrapper.dataset.msValues = currentVals.join(',');

            const display = document.createElement('div');
            display.className = 'multiselect-display';

            const dropdown = document.createElement('div');
            dropdown.className = 'multiselect-dropdown';

            function renderChips() {
              const vals = (wrapper.dataset.msValues || '').split(',').filter(Boolean);
              display.innerHTML = '';
              if (vals.length === 0) {
                const ph = document.createElement('span');
                ph.className = 'ms-placeholder';
                ph.textContent = 'Select payload sources…';
                display.appendChild(ph);
              } else {
                vals.forEach(v => {
                  const chip = document.createElement('span');
                  chip.className = 'multiselect-chip';
                  chip.innerHTML = escapeHtml(v) + '<span class="ms-chip-remove" data-val="' + escapeHtml(v) + '">×</span>';
                  display.appendChild(chip);
                });
              }
            }

            function renderDropdown() {
              const vals = (wrapper.dataset.msValues || '').split(',').filter(Boolean);
              dropdown.innerHTML = '';
              f.options.forEach(opt => {
                const optEl = document.createElement('div');
                optEl.className = 'multiselect-option' + (vals.includes(opt.value) ? ' selected' : '');
                optEl.innerHTML = '<span class="ms-check">✓</span>' + escapeHtml(opt.label);
                optEl.dataset.optValue = opt.value;
                optEl.addEventListener('click', (ev) => {
                  ev.stopPropagation();
                  let curVals = (wrapper.dataset.msValues || '').split(',').filter(Boolean);
                  if (curVals.includes(opt.value)) {
                    curVals = curVals.filter(v => v !== opt.value);
                  } else {
                    curVals.push(opt.value);
                  }
                  wrapper.dataset.msValues = curVals.join(',');
                  renderChips();
                  renderDropdown();
                });
                dropdown.appendChild(optEl);
              });
            }

            display.addEventListener('click', (ev) => {
              ev.stopPropagation();
              const isOpen = dropdown.classList.contains('open');
              // Close any other open dropdowns
              document.querySelectorAll('.multiselect-dropdown.open').forEach(d => d.classList.remove('open'));
              document.querySelectorAll('.multiselect-display.open').forEach(d => d.classList.remove('open'));
              if (!isOpen) {
                dropdown.classList.add('open');
                display.classList.add('open');
              }
            });

            // Remove chip on × click
            display.addEventListener('click', (ev) => {
              if (ev.target.classList.contains('ms-chip-remove')) {
                ev.stopPropagation();
                const removeVal = ev.target.dataset.val;
                let curVals = (wrapper.dataset.msValues || '').split(',').filter(Boolean);
                curVals = curVals.filter(v => v !== removeVal);
                wrapper.dataset.msValues = curVals.join(',');
                renderChips();
                renderDropdown();
              }
            });

            renderChips();
            renderDropdown();

            wrapper.appendChild(display);
            wrapper.appendChild(dropdown);
            input = wrapper;
          } else {
            input = document.createElement('input');
            input.type = 'text';
            input.className = 'edit-modal-input';
            input.value = f.value;
          }
          input.dataset.fieldKey = f.key;

          row.appendChild(label);
          row.appendChild(input);
          if (f.hint) {
            const hint = document.createElement('div');
            hint.className = 'edit-modal-hint';
            hint.textContent = f.hint;
            row.appendChild(hint);
          }
          body.appendChild(row);
        });

        _editModalOnSave = onSave;
        _editModalOnCancel = onCancel;

        overlay.classList.add('visible');

        // Focus first input
        setTimeout(() => {
          const firstInput = body.querySelector('.edit-modal-input');
          if (firstInput) firstInput.focus();
        }, 150);
      }

      function closeEditModal() {
        const overlay = document.getElementById('edit-modal-overlay');
        overlay.classList.remove('visible');
        _editModalOnSave = null;
        _editModalOnCancel = null;
      }

      // Wire up edit modal buttons (once)
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('edit-modal-save-btn').addEventListener('click', () => {
          if (_editModalOnSave) {
            const vals = {};
            document.getElementById('edit-modal-body').querySelectorAll('[data-field-key]').forEach(inp => {
              if (inp.classList.contains('multiselect-wrapper')) {
                vals[inp.dataset.fieldKey] = inp.dataset.msValues || '';
              } else {
                vals[inp.dataset.fieldKey] = inp.value;
              }
            });
            _editModalOnSave(vals);
          }
          closeEditModal();
        });
        document.getElementById('edit-modal-cancel-btn').addEventListener('click', () => {
          if (_editModalOnCancel) _editModalOnCancel();
          closeEditModal();
        });
        document.getElementById('edit-modal-close-btn').addEventListener('click', () => {
          if (_editModalOnCancel) _editModalOnCancel();
          closeEditModal();
        });
        document.getElementById('edit-modal-overlay').addEventListener('click', (e) => {
          if (e.target === e.currentTarget) {
            if (_editModalOnCancel) _editModalOnCancel();
            closeEditModal();
          }
        });
        // Escape key
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && document.getElementById('edit-modal-overlay').classList.contains('visible')) {
            if (_editModalOnCancel) _editModalOnCancel();
            closeEditModal();
          }
        });
      });

      // Backward-compatible helper: returns a no-op placeholder (edit forms no longer inline)
      function buildEditForm(opts) {
        // Store opts on a hidden element so callers can trigger the modal later
        const placeholder = document.createElement('div');
        placeholder.style.display = 'none';
        placeholder._editOpts = opts;

      // ===== Apply edit to YAML =====
      // stepName = null means edit the root KB header
      // stepName = string means edit the flow step with that name
      function applyEditToYaml(stepName, vals) {
        try {
          const yamlStr = aceEditor.getValue();
          const doc = jsyaml.load(yamlStr);

          // Find kb using same logic
          let kb = null;
          let isWrapped = false;
          if (doc.knowledgeBase && typeof doc.knowledgeBase === 'object') {
            kb = doc.knowledgeBase;
            isWrapped = true;
          } else if (doc.name || doc.flow) {
            kb = doc;
          } else {
            for (const k of Object.keys(doc)) {
              const val = doc[k];
              if (val && typeof val === 'object' && (val.name || val.flow)) {
                kb = val;
                isWrapped = true;
                break;
              }
            }
          }
          if (!kb) { setStatus('error', 'Cannot find KB in YAML'); return; }

          if (stepName === null) {
            // --- Editing root KB header ---
            if (vals.name !== undefined) kb.name = vals.name;
            if (vals.description !== undefined) kb.description = vals.description;
            if (vals.type !== undefined) kb.type = vals.type;
            if (vals.module !== undefined) kb.module = vals.module;
            if (vals.service !== undefined) kb.service = vals.service;
            if (vals.status !== undefined) kb.status = vals.status;
            if (vals.systemPrompt !== undefined) kb.systemPrompt = vals.systemPrompt;
            // Data field (SQL / plain text / JSON)
            if (vals.data !== undefined) kb.data = vals.data;
            // Parameters field (parse YAML string back to object)
            if (vals.parameters !== undefined) {
              const pStr = vals.parameters.trim();
              if (!pStr) {
                kb.parameters = null;
              } else {
                try { kb.parameters = jsyaml.load(pStr); } catch (e) { kb.parameters = pStr; }
              }
            }
            // UserPrompt field — update inside data JSON
            if (vals.userPrompt !== undefined && kb.data) {
              try {
                let dataObj = kb.data;
                if (typeof dataObj === 'string') {
                  let cleaned = dataObj
                    .replace(/\\r\\n/g, '').replace(/\\r/g, '').replace(/\\n/g, '')
                    .replace(/\r\n/g, '').replace(/\r/g, '').replace(/\n/g, ' ').trim();
                  dataObj = JSON.parse(cleaned);
                }
                dataObj.UserPrompt = vals.userPrompt;
                kb.data = JSON.stringify(dataObj);
              } catch (e) { /* ignore if data is not JSON */ }
            }
          } else {
            // --- Editing a flow step (find by name) ---
            const flowArr = Array.isArray(kb.flow) ? kb.flow : [];
            const step = flowArr.find(f => f.name === stepName);
            if (!step) {
              setStatus('error', 'Flow step "' + stepName + '" not found');
              return;
            }
            const oldName = step.name;
            if (vals.name !== undefined) step.name = vals.name;
            if (vals.type !== undefined) step.type = vals.type;
            if (vals.description !== undefined) step.description = vals.description;
            if (vals.status !== undefined) step.status = vals.status;
            if (vals.service !== undefined) step.service = vals.service;
            if (vals.data !== undefined) step.data = vals.data;

            // Also update name and payload in data.Flow
            if (kb.data) {
              try {
                let dataObj = kb.data;
                if (typeof dataObj === 'string') {
                  let cleaned = dataObj
                    .replace(/\\r\\n/g, '').replace(/\\r/g, '').replace(/\\n/g, '')
                    .replace(/\r\n/g, '').replace(/\r/g, '').replace(/\n/g, ' ').trim();
                  dataObj = JSON.parse(cleaned);
                }
                if (dataObj.Flow && Array.isArray(dataObj.Flow)) {
                  const fEntry = dataObj.Flow.find(f => (f.Name || f.name) === oldName);
                  if (fEntry) {
                    // Update Name if changed
                    if (vals.name && vals.name !== oldName) {
                      if (fEntry.Name !== undefined) fEntry.Name = vals.name;
                      else if (fEntry.name !== undefined) fEntry.name = vals.name;
                    }
                    // Update Order if changed
                    if (vals.order !== undefined) {
                      const orderNum = parseInt(vals.order, 10);
                      if (!isNaN(orderNum)) {
                        if (fEntry.Order !== undefined) fEntry.Order = orderNum;
                        else if (fEntry.order !== undefined) fEntry.order = orderNum;
                        else fEntry.Order = orderNum;
                      }
                    }
                    // Update Payload if changed
                    if (vals.payload !== undefined) {
                      if (fEntry.Payload !== undefined) fEntry.Payload = vals.payload;
                      else if (fEntry.payload !== undefined) fEntry.payload = vals.payload;
                      else fEntry.Payload = vals.payload;
                    }
                  }
                  kb.data = JSON.stringify(dataObj);
                }
              } catch (e) { /* ignore */ }
            }
          }

          // Dump back to YAML
          const newYaml = jsyaml.dump(isWrapped ? doc : kb, {
            lineWidth: -1,
            noRefs: true,
            quotingType: '"',
            forceQuotes: false
          });
          aceEditor.setValue(newYaml, -1);
          checkModified();
          updateLineCount();
          setStatus('modified', stepName === null ? 'Knowledge base updated' : 'Flow step "' + (vals.name || stepName) + '" updated');

          // Re-render designer
          renderDesigner();
        } catch (e) {
          setStatus('error', 'Edit failed: ' + e.message);
        }
      }

      function initFlowDragDrop(container, flowItems) {
        let dragSrcName = null;

        function clearAllDragStyles() {
          container.querySelectorAll('.flow-block').forEach(b => b.classList.remove('drag-over'));
          container.querySelectorAll('.flow-connector').forEach(c => { c.classList.remove('drag-over'); c.textContent = '⬇'; });
          container.querySelectorAll('.parallel-group').forEach(p => p.classList.remove('drag-over'));
        }

        // --- Flow blocks: drag source + drop on block to join its order ---
        container.querySelectorAll('.flow-block').forEach(block => {
          block.addEventListener('dragstart', (e) => {
            dragSrcName = block.dataset.name;
            block.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragSrcName);
          });

          block.addEventListener('dragend', () => {
            block.classList.remove('dragging');
            clearAllDragStyles();
          });

          block.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            clearAllDragStyles();
            block.classList.add('drag-over');
          });

          block.addEventListener('dragleave', () => {
            block.classList.remove('drag-over');
          });

          block.addEventListener('drop', (e) => {
            e.preventDefault();
            clearAllDragStyles();
            if (!dragSrcName || dragSrcName === block.dataset.name) return;
            const targetOrder = parseInt(block.dataset.order, 10);
            updateFlowOrderInYaml(dragSrcName, targetOrder);
            dragSrcName = null;
          });
        });

        // --- Connectors: drop between groups to get a new unique order ---
        container.querySelectorAll('.flow-connector[data-drop-zone="connector"]').forEach(conn => {
          conn.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            clearAllDragStyles();
            conn.classList.add('drag-over');
            conn.textContent = '⬇ Drop here';
          });

          conn.addEventListener('dragleave', () => {
            conn.classList.remove('drag-over');
            conn.textContent = '⬇';
          });

          conn.addEventListener('drop', (e) => {
            e.preventDefault();
            clearAllDragStyles();
            conn.textContent = '⬇';
            if (!dragSrcName) return;
            // Calculate a new order between the two adjacent groups
            const before = conn.dataset.orderBefore ? parseInt(conn.dataset.orderBefore, 10) : 0;
            const after = parseInt(conn.dataset.orderAfter, 10);
            const newOrder = Math.floor((before + after) / 2);
            // If no room between integers, shift: use before + 1 and bump all >= that
            const finalOrder = (newOrder > before && newOrder < after) ? newOrder : before + 1;
            updateFlowOrderInYaml(dragSrcName, finalOrder, before >= finalOrder);
            dragSrcName = null;
          });
        });

        // --- Parallel groups: drop to join that parallel group ---
        container.querySelectorAll('.parallel-group[data-drop-zone="parallel"]').forEach(group => {
          group.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            clearAllDragStyles();
            group.classList.add('drag-over');
          });

          group.addEventListener('dragleave', (e) => {
            // Only remove if leaving the group entirely
            if (!group.contains(e.relatedTarget)) {
              group.classList.remove('drag-over');
            }
          });

          group.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            clearAllDragStyles();
            if (!dragSrcName) return;
            const targetOrder = parseInt(group.dataset.order, 10);
            updateFlowOrderInYaml(dragSrcName, targetOrder);
            dragSrcName = null;
          });
        });
      }

      // Update a flow step's Order in the data.Flow JSON by step name
      function updateFlowOrderInYaml(stepName, newOrder, needsShift) {
        try {
          const yamlStr = aceEditor.getValue();
          const doc = jsyaml.load(yamlStr);

          let kb = null;
          let isWrapped = false;
          if (doc.knowledgeBase && typeof doc.knowledgeBase === 'object') {
            kb = doc.knowledgeBase;
            isWrapped = true;
          } else if (doc.name || doc.flow) {
            kb = doc;
          } else {
            for (const k of Object.keys(doc)) {
              const val = doc[k];
              if (val && typeof val === 'object' && (val.name || val.flow)) {
                kb = val;
                isWrapped = true;
                break;
              }
            }
          }
          if (!kb) return;

          if (kb.data) {
            try {
              let dataObj = kb.data;
              if (typeof dataObj === 'string') {
                let cleaned = dataObj
                  .replace(/\\r\\n/g, '').replace(/\\r/g, '').replace(/\\n/g, '')
                  .replace(/\r\n/g, '').replace(/\r/g, '').replace(/\n/g, ' ').trim();
                dataObj = JSON.parse(cleaned);
              }
              if (dataObj.Flow && Array.isArray(dataObj.Flow)) {
                // If we need to shift existing orders to make room
                if (needsShift) {
                  dataObj.Flow.forEach(f => {
                    const fName = f.Name || f.name;
                    if (fName === stepName) return;
                    const curOrd = f.Order || f.order || 1;
                    if (curOrd >= newOrder) {
                      if (f.Order !== undefined) f.Order = curOrd + 1;
                      else if (f.order !== undefined) f.order = curOrd + 1;
                      else f.Order = curOrd + 1;
                    }
                  });
                }
                // Set the new order on the dragged step
                const fEntry = dataObj.Flow.find(f => (f.Name || f.name) === stepName);
                if (fEntry) {
                  if (fEntry.Order !== undefined) fEntry.Order = newOrder;
                  else if (fEntry.order !== undefined) fEntry.order = newOrder;
                  else fEntry.Order = newOrder;
                }
                kb.data = JSON.stringify(dataObj);
              }
            } catch (e) { /* data not JSON */ }
          }

          const newYaml = jsyaml.dump(isWrapped ? doc : kb, {
            lineWidth: -1,
            noRefs: true,
            quotingType: '"',
            forceQuotes: false
          });
          aceEditor.setValue(newYaml, -1);
          checkModified();
          updateLineCount();
          setStatus('modified', 'Order updated for "' + stepName + '" → ' + newOrder);

          renderDesigner();
        } catch (e) {
          setStatus('error', 'Reorder failed: ' + e.message);
        }
      }
    </script>
